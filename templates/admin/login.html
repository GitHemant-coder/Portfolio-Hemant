<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | HP Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { font-family: 'Inter', sans-serif; background: #050712; }
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    .neon-cyan { color: #00f5ff; text-shadow: 0 0 10px rgba(0,245,255,0.6); }
    .input-field {
      width: 100%; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0; outline: none; transition: all 0.3s ease;
    }
    .input-field:focus { border-color: rgba(0,245,255,0.5); box-shadow: 0 0 0 3px rgba(0,245,255,0.1); }
    .grid-bg {
      background-image: linear-gradient(rgba(0,245,255,0.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,245,255,0.06) 1px, transparent 1px);
      background-size: 50px 50px;
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center grid-bg relative">
  <div class="absolute top-20 left-10 w-72 h-72 rounded-full bg-cyan-500/10 blur-3xl"></div>
  <div class="absolute bottom-20 right-10 w-96 h-96 rounded-full bg-purple-600/10 blur-3xl"></div>

  <div class="glass rounded-2xl p-10 w-full max-w-md z-10">
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-cyan-500/30 to-purple-600/30 flex items-center justify-center">
        <i class="fas fa-lock text-cyan-400 text-2xl"></i>
      </div>
      <h1 class="font-orbitron text-2xl font-bold neon-cyan" style="font-family:'Orbitron',sans-serif;">Admin Panel</h1>
      <p class="text-gray-400 text-sm mt-1">Hemant Patil Portfolio</p>
    </div>

    {% if error %}
    <div class="bg-red-500/20 border border-red-500/30 text-red-300 rounded-xl px-4 py-3 text-sm mb-6">
      <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/login" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
        <div class="relative">
          <input name="username" type="text" required placeholder="admin"
            class="input-field pl-11"/>
          <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
        <div class="relative">
          <input name="password" type="password" required placeholder="••••••••"
            class="input-field pl-11"/>
          <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
        </div>
      </div>
      <button type="submit"
        class="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-cyan-500 to-purple-600 hover:brightness-110 hover:-translate-y-0.5 transition-all duration-200 shadow-lg shadow-cyan-500/25 mt-2">
        <i class="fas fa-sign-in-alt mr-2"></i>Login
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="/" class="text-sm text-gray-500 hover:text-cyan-400 transition-colors">
        <i class="fas fa-arrow-left mr-1"></i>Back to Portfolio
      </a>
    </div>
  </div>
</body>
</html>
