<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% if project %}Edit{% else %}Add{% endif %} Project | HP Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { font-family:'Inter',sans-serif; background:#050712; color:#e2e8f0; }
    .glass { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); border-radius:16px; }
    .input-field {
      width:100%; padding:12px 16px; border-radius:12px; font-size:.9rem;
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
      color:#e2e8f0; outline:none; transition:all .3s; font-family:inherit;
    }
    .input-field:focus { border-color:rgba(0,245,255,0.5); box-shadow:0 0 0 3px rgba(0,245,255,0.1); }
    .input-field::placeholder { color:rgba(156,163,175,0.5); }
    label { display:block; font-size:.85rem; font-weight:500; color:#d1d5db; margin-bottom:8px; }
    .grad-text { background:linear-gradient(135deg,#00f5ff,#b347ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  </style>
</head>
<body class="min-h-screen p-8">
  <div class="max-w-2xl mx-auto">

    <a href="/admin" class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-cyan-400 transition-colors mb-6 group">
      <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>Back to Dashboard
    </a>

    <div class="glass p-8">
      <h1 class="text-xl font-bold mb-6 grad-text">
        {% if project %}Edit Project{% else %}Add New Project{% endif %}
      </h1>

      <form method="POST" class="space-y-5">
        <div>
          <label>Project Title *</label>
          <input name="title" type="text" required class="input-field"
            value="{{ project.title if project else '' }}"
            placeholder="e.g. Student Management System"/>
        </div>

        <div>
          <label>Description *</label>
          <textarea name="description" rows="5" required class="input-field resize-none"
            placeholder="Describe what the project does and what problem it solves…">{{ project.description if project else '' }}</textarea>
        </div>

        <div>
          <label>Tech Stack * <span class="text-gray-500 font-normal">(comma-separated)</span></label>
          <input name="tech_stack" type="text" required class="input-field"
            value="{{ project.tech_stack if project else '' }}"
            placeholder="Python, Django, MySQL, Bootstrap"/>
        </div>

        <div>
          <label>Live URL <span class="text-gray-500 font-normal">(optional)</span></label>
          <input name="live_url" type="url" class="input-field"
            value="{{ project.live_url if project else '' }}"
            placeholder="https://…"/>
        </div>

        <div class="flex items-center gap-3 p-4 rounded-xl"
          style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);">
          <input name="is_featured" type="checkbox" id="is_featured" class="w-5 h-5 accent-cyan-400"
            {% if project and project.is_featured %}checked{% endif %}/>
          <label for="is_featured" class="mb-0 cursor-pointer">
            Feature on homepage
            <span class="text-gray-500 font-normal text-xs ml-1">(shown in the top 3 project cards)</span>
          </label>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit"
            class="flex-1 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-cyan-500 to-purple-600
                   hover:brightness-110 transition-all shadow-lg shadow-cyan-500/20">
            <i class="fas {% if project %}fa-save{% else %}fa-plus{% endif %} mr-2"></i>
            {% if project %}Update{% else %}Add{% endif %} Project
          </button>
          <a href="/admin"
            class="px-6 py-3 rounded-xl border border-white/10 text-gray-400 hover:text-white hover:border-white/20
                   transition-all font-medium text-center">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
